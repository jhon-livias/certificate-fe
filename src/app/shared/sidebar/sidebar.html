<aside class="w-64 bg-slate-900 text-white flex flex-col h-full">
  <div class="p-6">
    <h1 class="text-2xl font-bold tracking-wider text-blue-400">
      <i class="fa-solid fa-file-signature mr-2"></i>SGC
    </h1>
    <p class="text-xs text-slate-400 mt-1">Generador de Constancias</p>
  </div>

  <nav class="flex-1 px-4 space-y-2 mt-4 overflow-y-auto">
    <div>
      <button (click)="toggleStudents()"
        class="w-full text-left px-4 py-3 rounded-lg hover:bg-slate-800 transition-colors flex items-center justify-between">
        <div class="flex items-center"><i class="fa-solid fa-user-graduate w-6"></i> Estudiantes</div>
        <i class="fa-solid fa-chevron-down text-xs transition-transform duration-200"
          [class.rotate-180]="openStudents()"></i>
      </button>

      @if (openStudents()) {
      <div class="pl-4 pr-2 py-2 space-y-1">
        <a routerLink="/estudiantes/listado" routerLinkActive="bg-blue-600 text-white"
          class="block w-full text-left px-4 py-2 rounded-lg transition-colors text-sm text-slate-300 hover:text-white hover:bg-slate-800">
          <i class="fa-solid fa-table-list w-5"></i> Listado
        </a>
        <a routerLink="/estudiantes/carga" routerLinkActive="bg-blue-600 text-white"
          class="block w-full text-left px-4 py-2 rounded-lg transition-colors text-sm text-slate-300 hover:text-white hover:bg-slate-800">
          <i class="fa-solid fa-upload w-5"></i> Cargar Data (SGA)
        </a>
      </div>
      }
    </div>

    <a routerLink="/plantillas" routerLinkActive="bg-blue-600"
      class="block w-full text-left px-4 py-3 rounded-lg transition-colors text-slate-300 hover:text-white hover:bg-slate-800">
      <i class="fa-solid fa-file-word w-6"></i> Plantillas Word
    </a>

    <a routerLink="/generar-envio" routerLinkActive="bg-blue-600"
      class="block w-full text-left px-4 py-3 rounded-lg transition-colors text-slate-300 hover:text-white hover:bg-slate-800">
      <i class="fa-solid fa-wand-magic-sparkles w-6"></i> Generar y Enviar
    </a>

    <button
      class="block w-full text-left px-4 py-3 rounded-lg transition-colors text-slate-300 hover:text-white hover:bg-slate-800 cursor-pointer"
      (click)="logout()">
      <i class="fa-solid fa-right-from-bracket w-6"></i> Cerrar Sesión
    </button>
  </nav>

  <div class="p-4 border-t border-slate-700">
    <div class="flex items-center">
      <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center font-bold">{{ initials() }}</div>
      <div class="ml-3 text-sm">
        <p class="font-medium">{{ username() }}</p>
      </div>

    </div>
  </div>
</aside>
